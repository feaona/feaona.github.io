<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景分析-策略 (1920x1080)</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'DIN Alternate', 'DIN Condensed', 'PingFang SC', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        *, *::before, *::after {
            font-weight: 400;
        }

        /* 核心画布区域，严格限制 1920x1080 */
        .canvas-1920 {
            width: 1920px;
            height: 1080px;
            background-color: #fcfdfa; /* 统一的极简灰白底色 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0,0,0,0.1);
            flex-shrink: 0;
            transform-origin: center center;
        }

        /* 策略圈样式 */
        .strategy-circle {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            z-index: 20;
        }

        .strategy-circle:hover {
            border-color: #F8D560;
            box-shadow: 0 15px 35px -5px rgba(248, 213, 96, 0.25);
            transform: translateY(-5px);
        }

        /* 胶囊标签样式 */
        .pill-gray {
            background-color: #f3f4f6;
            color: #4b5563;
            border-radius: 9999px;
            padding: 10px 36px;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: absolute;
            z-index: 10;
        }

        .pill-yellow {
            background-color: #F8D560;
            color: #ffffff;
            border-radius: 9999px;
            padding: 10px 36px;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 8px 15px -3px rgba(171, 204, 88, 0.3);
            position: absolute;
            z-index: 10;
        }

    </style>
</head>
<body>
    
    <!-- 1920*1080 固定画布 -->
    <div class="canvas-1920" id="main-canvas">
        
        <!-- ================= 左侧标题区域 ================= -->
        
        <!-- 水印文字：对齐 01 页面的字号 -->
        <div class="absolute top-[100px] left-[100px] flex items-baseline pointer-events-none select-none z-10 opacity-70">
            <span class="text-[100px] font-black text-[#ABCC58] tracking-tighter leading-none">04<span style="color:#F8D560">.</span></span>
            <span class="text-[80px] font-black text-[#dce2c6] tracking-widest ml-4 uppercase leading-none mix-blend-multiply">Design</span>
        </div>

        <!-- 主标题 -->
        <div class="absolute top-[240px] left-[120px] z-20">
            <h1 class="text-[48px] font-black text-gray-900">
                背-景-分-析
            </h1>
        </div>

        <!-- ================= 左侧虚线指引标识 (严格还原模板排版) ================= -->
        
        <!-- 1. 产品策略虚线 -->
        <div class="absolute top-[450px] left-[120px] w-[630px] z-10">
            <div class="absolute bottom-[16px] right-0">
                <span class="text-[42px] text-gray-700">产品策略</span>
            </div>
            <div class="w-full border-b-[3px] border-dashed border-[#F8D560] opacity-60"></div>
        </div>

        <!-- 2. 设计策略虚线 -->
        <div class="absolute top-[850px] left-[120px] w-[630px] z-10">
            <div class="absolute bottom-[16px] right-0">
                <span class="text-[42px] text-gray-700">设计策略</span>
            </div>
            <div class="w-full border-b-[3px] border-dashed border-[#F8D560] opacity-60"></div>
        </div>


        <!-- ================= 右侧视觉模型图区域 ================= -->
        <div class="absolute left-[780px] top-[180px] w-[1000px] h-[800px] flex justify-between z-20">
            
            <!-- 第 1 列 -->
            <div class="w-[280px] h-full flex flex-col items-center relative">
                <!-- 顶部胶囊 -->
                <div class="top-[20px] pill-gray tracking-widest">吸引用户</div>
                
                <!-- 上方圆环 (产品策略) -->
                <div class="top-[140px] strategy-circle">
                    <span class="text-[30px] font-bold text-gray-800 mb-3 tracking-widest">目标感</span>
                    <span class="text-[22px] text-gray-500 font-medium">免费抽奖</span>
                </div>
                
                <!-- 连接箭头 & 文案 -->
                <div class="absolute top-[400px] w-[2px] h-[140px] bg-[#F8D560] opacity-60"></div>
                <div class="absolute top-[530px] w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-[#F8D560] opacity-60"></div>
                <div class="absolute top-[455px] text-[#F8D560] font-bold text-[22px] bg-[#fcfdfa] px-3 z-30 tracking-widest">【获取福利】</div>
                
                <!-- 下方圆环 (设计策略) -->
                <div class="top-[540px] strategy-circle">
                    <span class="text-[30px] font-bold text-gray-800 mb-3 tracking-widest">视觉一致</span>
                    <span class="text-[22px] text-gray-500 font-medium">风格保持统一</span>
                </div>
            </div>

            <!-- 第 2 列 -->
            <div class="w-[280px] h-full flex flex-col items-center relative">
                <!-- 顶部胶囊 -->
                <div class="top-[20px] pill-gray tracking-widest">增加活动</div>
                
                <!-- 上方圆环 (产品策略) -->
                <div class="top-[140px] strategy-circle">
                    <span class="text-[30px] font-bold text-gray-800 mb-3 tracking-widest">活动内容</span>
                    <span class="text-[22px] text-gray-500 font-medium text-center">多维玩法<br>转盘/秒杀/立减</span>
                </div>
                
                <!-- 连接箭头 & 文案 -->
                <div class="absolute top-[400px] w-[2px] h-[140px] bg-[#F8D560] opacity-60"></div>
                <div class="absolute top-[530px] w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-[#F8D560] opacity-60"></div>
                <div class="absolute top-[455px] text-[#F8D560] font-bold text-[22px] bg-[#fcfdfa] px-3 z-30 tracking-widest">【获取权益】</div>
                
                <!-- 下方圆环 (设计策略) -->
                <div class="top-[540px] strategy-circle">
                    <span class="text-[30px] font-bold text-gray-800 mb-3 tracking-widest">加强氛围</span>
                    <span class="text-[22px] text-gray-500 font-medium text-center">3D场景搭建<br>动态效果引导</span>
                </div>
            </div>

            <!-- 第 3 列 -->
            <div class="w-[280px] h-full flex flex-col items-center relative">
                <!-- 顶部胶囊 (高亮黄色) -->
                <div class="top-[20px] pill-yellow tracking-widest">活动氛围</div>
                
                <!-- 上方圆环 (产品策略) -->
                <div class="top-[140px] strategy-circle">
                    <span class="text-[30px] font-bold text-gray-800 mb-3 tracking-widest">活动结果</span>
                    <span class="text-[22px] text-gray-500 font-medium text-center leading-snug">用户转化成交<br>业务粘性增强</span>
                </div>
                
                <!-- 连接箭头 & 文案 -->
                <div class="absolute top-[400px] w-[2px] h-[140px] bg-[#F8D560] opacity-60"></div>
                <div class="absolute top-[530px] w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-[#F8D560] opacity-60"></div>
                <div class="absolute top-[455px] text-[#F8D560] font-bold text-[22px] bg-[#fcfdfa] px-3 z-30 tracking-widest">【吸引成交】</div>
                
                <!-- 下方圆环 (设计策略) -->
                <div class="top-[540px] strategy-circle">
                    <span class="text-[30px] font-bold text-gray-800 mb-3 tracking-widest">用户体验</span>
                    <span class="text-[22px] text-gray-500 font-medium">沉浸式惊喜感</span>
                </div>
            </div>

        </div>

    </div>

    <!-- 兼容性完美的 JS 动态缩放控制 -->
    <script>
        function fitToScreen() {
            const canvas = document.getElementById('main-canvas');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            canvas.style.transform = `scale(${scale})`;
        }
        fitToScreen();
        window.addEventListener('resize', fitToScreen);
    </script>
</body>
</html>
