<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业智能检索与防撞单图谱 - 交互设计方案</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #080e1a;
            color: rgba(255,255,255,0.85);
            padding: 52px 48px 60px;
            min-height: 100vh;
        }

        /* ── Top header ── */
        .phase-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: rgba(26,159,218,0.75);
            margin-bottom: 10px;
        }

        .section-eyebrow {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.25);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 26px;
            font-weight: 700;
            color: rgba(255,255,255,0.92);
            line-height: 1.28;
            letter-spacing: -.5px;
            margin-bottom: 10px;
        }

        .section-title strong { color: #1A9FDA; }

        .section-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(26,159,218,0.1);
            border: 1px solid rgba(26,159,218,0.22);
            padding: 3px 12px;
            border-radius: 999px;
            font-size: 10.5px;
            font-weight: 600;
            color: rgba(26,159,218,0.85);
            margin-bottom: 10px;
        }

        .section-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        /* ── Main two-column layout ── */
        .main-layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        /* Left: cards column */
        .left-col {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Right: image column */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }

        .right-col img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .img-divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        /* ── Highlight cards ── */
        .highlight-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 16px 16px 16px 20px;
            position: relative;
            overflow: hidden;
        }

        .card-accent {
            position: absolute;
            left: 0;
            top: 16px;
            bottom: 16px;
            width: 3px;
            border-radius: 0 2px 2px 0;
        }

        .card-snippet {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            gap: 8px;
        }

        .card-title {
            font-size: 12.5px;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.36);
            line-height: 1.65;
        }

        /* Status tags */
        .tag-green {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.28);
            color: #6ee7b7;
            font-size: 10.5px;
            padding: 2px 9px;
            border-radius: 5px;
        }

        .tag-red {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
            font-size: 10.5px;
            padding: 2px 9px;
            border-radius: 5px;
        }

        .alert-bar {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.18);
            border-radius: 7px;
            padding: 7px 10px;
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 10.5px;
            color: #fca5a5;
            width: 100%;
        }

        /* Graph nodes */
        .node-blue  { width:9px;  height:9px;  border-radius:3px; background:#1A9FDA; border:1px solid rgba(26,159,218,0.7);  flex-shrink:0; }
        .node-red   { width:7px;  height:7px;  border-radius:2px; background:#ef4444; border:1px solid rgba(239,68,68,0.7);   flex-shrink:0; }
        .node-green { width:7px;  height:7px;  border-radius:2px; background:#10b981; border:1px solid rgba(16,185,129,0.7);  flex-shrink:0; }
    </style>
</head>
<body>

    <!-- Header -->
    <h1 class="section-title" style="color:#ffffff;">线索到量产交互设计方案</h1>
    <div class="section-badge">页面 01：智能检索与防撞单</div>
    <p class="section-desc">为 B 端销售团队设计的企业信息智能检索工具，通过核心状态可视化、智能风险拦截与架构图谱防撞单，实现资源全局管控，提升销售决策效率。</p>

    <!-- Main layout: left cards + right images -->
    <div class="main-layout">

        <!-- Left: three highlight cards -->
        <div class="left-col">

            <!-- Card 1 -->
            <div class="highlight-card">
                <div class="card-accent" style="background:#1A9FDA"></div>
                <div class="card-snippet">
                    <span class="tag-green">
                        <span style="width:5px;height:5px;border-radius:50%;background:#10b981;flex-shrink:0"></span>
                        存续
                    </span>
                    <span class="tag-red">
                        <svg width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 1.944A11.954 11.954 0 012.166 5C2.056 5.649 2 6.319 2 7c0 5.225 3.34 9.67 8 11.317C14.66 16.67 18 12.225 18 7c0-.682-.057-1.35-.166-1.998A11.954 11.954 0 0110 1.944zM11 14a1 1 0 11-2 0 1 1 0 012 0zm0-7a1 1 0 10-2 0v3a1 1 0 102 0V7z" clip-rule="evenodd"/></svg>
                        高风险
                    </span>
                </div>
                <div class="card-title">核心状态可视化</div>
                <p class="card-desc">高价值状态标签列表直显，无需进入详情页，判断企业资质快 1 秒。</p>
            </div>

            <!-- Card 2 -->
            <div class="highlight-card">
                <div class="card-accent" style="background:#ef4444"></div>
                <div class="card-snippet">
                    <div class="alert-bar">
                        <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">该企业存在 3 起买卖合同纠纷...</span>
                    </div>
                </div>
                <div class="card-title">智能风险拦截</div>
                <p class="card-desc">异常信息置顶强提示，高频动作前置拦截，降低交易连带风险。</p>
            </div>

            <!-- Card 3 -->
            <div class="highlight-card">
                <div class="card-accent" style="background:#7c3aed"></div>
                <div class="card-snippet" style="flex-direction:column;align-items:flex-start;padding-left:18px;gap:7px">
                    <div style="display:flex;align-items:center;gap:7px;position:relative">
                        <div class="node-blue"></div>
                        <div style="height:3px;width:48px;background:rgba(26,159,218,0.2);border-radius:2px"></div>
                        <div style="position:absolute;left:4px;top:9px;width:1px;height:34px;background:rgba(255,255,255,0.14)"></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:7px;position:relative;padding-left:13px">
                        <div style="position:absolute;left:4px;top:50%;width:9px;height:1px;background:rgba(255,255,255,0.14)"></div>
                        <div class="node-red"></div>
                        <div style="height:3px;width:56px;background:rgba(239,68,68,0.2);border-radius:2px"></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:7px;position:relative;padding-left:13px">
                        <div style="position:absolute;left:4px;top:50%;width:9px;height:1px;background:rgba(255,255,255,0.14)"></div>
                        <div class="node-green"></div>
                        <div style="height:3px;width:42px;background:rgba(16,185,129,0.2);border-radius:2px"></div>
                    </div>
                </div>
                <div class="card-title">架构图谱防撞单</div>
                <p class="card-desc">图谱化展示集团母子关联架构，直观暴露撞单风险节点，实现资源全局管控。</p>
            </div>

        </div>

        <!-- Right: stacked images -->
        <div class="right-col">
            <img src="../image/L2C/1企查1.webp" alt="企信智能检索界面 - 检索页">
            <div class="img-divider"></div>
            <img src="../image/L2C/1企查2.webp" alt="企信智能检索界面 - 防撞单图谱">
        </div>

    </div>

</body>
</html>
