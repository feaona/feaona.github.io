<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聚行 ZHIJUXING - 品牌开屏</title>
    <style>
        /* ==========================================================================
           基础与重置
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #040d1a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ==========================================================================
           开屏动画样式 (Splash Screen)
           ========================================================================== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 使用带有深邃感的科技暗色背景，能让蓝色发光效果更惊艳 */
            background: radial-gradient(ellipse at 30% 60%, #0f2540 0%, #040d1a 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            animation: splashFadeLoop 5s forwards;
        }

        .logo-container {
            width: 165px; /* 完全按照图一比例缩放 */
            height: auto;
            margin-bottom: 12px;
            /* 增加科技感蓝色悬浮光晕 */
            filter: drop-shadow(0 4px 15px rgba(26, 159, 218, 0.4));
        }

        /* 统一控制所有图形路径的动画 */
        .logo-path {
            fill: transparent; /* 初始透明 */
            stroke: #1A9FDA;   /* 品牌色边框 */
            stroke-width: 8;   /* 相对 SVG ViewBox (1041x949) 的线宽 */
            stroke-linejoin: round;
            stroke-linecap: round;
            
            /* 阶段 1 用到的 stroke 属性 */
            stroke-dasharray: 1;
            stroke-dashoffset: 1;

            /* 阶段 1 和 阶段 2 的连贯动画 */
            animation:
                drawStroke 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                fillLogo 0.6s cubic-bezier(0.4, 0, 0.2, 1) 1.8s forwards;
        }

        /* ==========================================================================
           品牌文字排版与动效
           ========================================================================== */
        .brand-text {
            width: 200px; /* 设定基准宽度，确保中英文两端完美对齐（参照图一） */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 中文书法Logo图片包装 */
        .zh-logo-wrapper {
            width: 100%;
            opacity: 0; /* 初始隐藏 */
            transform: translateY(15px); /* 初始下沉 */
            /* 阶段 3：在图形填充后触发中文浮现 */
            animation: textFadeUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 1.9s forwards;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .zh-logo {
            width: 100%; /* 宽度占满基准宽度 */
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(26, 159, 218, 0.3));
        }

        /* 中文Logo加载失败时的防重叠回退方案 */
        .zh-text-fallback {
            display: none;
            width: 100%;
            font-size: 12px;
            color: #1A9FDA;
            text-align: center;
            border: 1px dashed #1A9FDA;
            padding: 8px;
            border-radius: 4px;
            background: rgba(26, 159, 218, 0.1);
            line-height: 1.5;
        }

        /* 英文拼音SVG组合 */
        .en-svg-group {
            width: 100%; /* 宽度占满基准宽度 */
            opacity: 0;
            transform: translateY(15px);
            /* 阶段 4：比中文略晚0.2秒触发，形成视觉递进层级 */
            animation: textFadeUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 2.1s forwards;
            display: flex;
            align-items: center;
            justify-content: space-between; /* 【核心对齐】参照图一，让ZHIJUXING的首尾字母与中文两侧完美齐平 */
            height: 16px; /* 控制拼音字母大小，自动缩放 */
            filter: drop-shadow(0 2px 8px rgba(26, 159, 218, 0.3));
        }

        .en-svg-group svg {
            height: 100%;
            width: auto;
            display: block;
        }

        /* ==========================================================================
           动画关键帧 (Keyframes)
           ========================================================================== */
        
        /* 阶段 1：科技感线条生长 */
        @keyframes drawStroke {
            0% { stroke-dashoffset: 1; }
            100% { stroke-dashoffset: 0; }
        }

        /* 阶段 2：色彩填充 */
        @keyframes fillLogo {
            0% {
                fill: transparent;
                stroke: #1A9FDA;
            }
            100% {
                fill: #1A9FDA;
                stroke: #1A9FDA;
            }
        }

        /* 阶段 3 & 4：品牌文字顺次浮现 */
        @keyframes textFadeUp {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 循环淡出：在 3.5s 时开始淡出，4.4s 完全透明，5s 重置 */
        @keyframes splashFadeLoop {
            0%, 70% { opacity: 1; }
            88%      { opacity: 0; }
            100%     { opacity: 0; }
        }

        /* 阶段 5：优雅退场 (如需使用) */
        @keyframes splashExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }
            100% {
                opacity: 0;
                transform: translateY(-40px) scale(1.05); 
                pointer-events: none; 
                visibility: hidden; 
            }
        }
    </style>
</head>
