<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聚行APP - 旅游团建定制服务平台</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        html {
            background: linear-gradient(135deg, #dceaff 0%, #edf4ff 50%, #dceaff 100%);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { display: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(135deg, #dceaff 0%, #edf4ff 50%, #dceaff 100%);
            scrollbar-width: none;
            -ms-overflow-style: none;
            max-width: 1920px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        body::-webkit-scrollbar { display: none; }

        /* 入场元素：JS 加载前先隐藏，避免闪现 */
        #iphone-mockup, #anim-brand, #anim-tag,
        #anim-h1, #anim-h2, #anim-divider,
        #anim-desc, #anim-impact, #anim-role {
            opacity: 0;
        }

        /* 轮播容器：撑满 #phone-screen */
        #slideshow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        /* 所有轮播图统一规范，Single Source of Truth */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to   { opacity: 1; transform: translateX(0);     }
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.25s ease-out;
        }
        .slide.active {
            opacity: 1;
            z-index: 2;
            animation: slideIn 0.25s ease-out both;
        }

        /* 背景波点矩阵 */
        .dot-matrix {
            background-image: radial-gradient(rgba(100, 150, 255, 0.15) 2px, transparent 2px);
            background-size: 16px 16px;
        }
    </style>
</head>

    <div class="absolute top-10 right-10 w-64 h-64 lg:w-96 lg:h-96 dot-matrix opacity-70 pointer-events-none rounded-full mask-image:radial-gradient(black,transparent)"></div>
    <div class="absolute top-[600px] left-10 w-64 h-64 lg:w-80 lg:h-80 dot-matrix opacity-70 pointer-events-none"></div>

    <!-- 背景装饰：大波浪形亮色块 -->
    <div class="absolute top-[-10%] left-[20%] w-[120%] h-[120%] bg-white/20 rounded-[100%] -rotate-12 blur-3xl pointer-events-none z-0"></div>

    <script>
        function runEntrance() {
            const E = 'power3.out';
            const D = 0.82;

            const tl = gsap.timeline();

            tl
            /* 样机框整体淡入+轻微上移 */
            .fromTo('#iphone-mockup',
                { opacity: 0, y: 24 },
                { opacity: 1, y: 0, duration: D, ease: E }, 0)

            .fromTo('#anim-brand',
                { opacity: 0, filter: 'blur(6px)', y: 10 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: 0.65, ease: E }, 0.08)

            .fromTo('#anim-tag',
                { opacity: 0, filter: 'blur(8px)', y: 10 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: D, ease: E }, 0.18)

            .fromTo('#anim-h1',
                { opacity: 0, filter: 'blur(10px)', y: 14 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: D, ease: E }, 0.30)

            .fromTo('#anim-h2',
                { opacity: 0, filter: 'blur(8px)', y: 10 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: D, ease: E }, 0.42)

            .fromTo('#anim-divider',
                { opacity: 0, scaleX: 0, transformOrigin: 'left center' },
                { opacity: 1, scaleX: 1, duration: 0.48, ease: 'power2.out' }, 0.52)

            .fromTo('#anim-desc',
                { opacity: 0, filter: 'blur(8px)', y: 10 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: D, ease: E }, 0.58)

            .fromTo('#anim-impact',
                { opacity: 0, filter: 'blur(6px)', y: 8 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: D, ease: E }, 0.68)

            .fromTo('#anim-role',
                { opacity: 0, filter: 'blur(6px)', y: 8 },
                { opacity: 1, filter: 'blur(0px)', y: 0, duration: D, ease: E }, 0.76)

            /* 入场完成后启动轮播：纯 class 切换，CSS transition 驱动 */
            .call(function() {
                var slides = Array.from(document.querySelectorAll('#slideshow .slide'));
                var current = 0;

                setInterval(function() {
                    slides[current].classList.remove('active');
                    current = (current + 1) % slides.length;
                    slides[current].classList.add('active');
                }, 3000);
            }, null, 1.2);
        }

        /* ── 触发机制：IntersectionObserver 监听主容器
              只有它真正出现在 iframe 视口中才触发动效
              threshold:0.15 = 页面至少露出 15% 时开始 ── */
        window.addEventListener('load', function() {
            const sentinel = document.querySelector('.grid') || document.body;

            const io = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting) {
                    io.disconnect();
                    runEntrance();
                }
            }, { threshold: 0.15 });

            io.observe(sentinel);
        });
    </script>
