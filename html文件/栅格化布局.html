<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智造芯连 - 栅格布局规范</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <style>
        @import url('https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blueprint-bg {
            background: transparent;
        }

        /* 标注线样式 */
        .measure-line {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #60a5fa; /* Tailwind blue-400 */
        }
        
        .measure-line-h {
            border-top: 1px solid #60a5fa;
            height: 1px;
        }
        .measure-line-h::before, .measure-line-h::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 8px;
            background-color: #60a5fa;
            top: -4px;
        }
        .measure-line-h::before { left: 0; }
        .measure-line-h::after { right: 0; }

        .measure-line-v {
            border-left: 1px solid #60a5fa;
            width: 1px;
        }
        .measure-line-v::before, .measure-line-v::after {
            content: '';
            position: absolute;
            height: 1px;
            width: 8px;
            background-color: #60a5fa;
            left: -4px;
        }
        .measure-line-v::before { top: 0; }
        .measure-line-v::after { bottom: 0; }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }

        /* 自定义标尺箭头 */
        .arrow-left::before {
            content: ''; position: absolute; left: 0; top: -3px;
            border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-right: 6px solid #60a5fa;
        }
        .arrow-right::after {
            content: ''; position: absolute; right: 0; top: -3px;
            border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-left: 6px solid #60a5fa;
        }
        .arrow-up::before {
            content: ''; position: absolute; top: 0; left: -3px;
            border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 6px solid #60a5fa;
        }
        .arrow-down::after {
            content: ''; position: absolute; bottom: 0; left: -3px;
            border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 6px solid #60a5fa;
        }
    </style>
</head>
<!-- 设置 body 高度为 100vh 且不许垂直滚动，让内容完全在首屏内居中 -->
<body class="blueprint-bg w-screen h-screen overflow-hidden flex items-center justify-center p-4 lg:p-8">

    <!-- 主容器：强制横向排列 (flex-row)，绝对防止换行引起上下滚动 -->
    <div class="w-full max-w-[1600px] max-h-full mx-auto flex flex-row gap-6 lg:gap-12 items-center justify-center">
        
        <!-- 左侧文本信息区 -->
        <div class="w-[240px] lg:w-[260px] flex-shrink-0 flex flex-col justify-center py-8 z-20">
            <!-- 标题 -->
            <div class="relative mb-8">
                <h1 class="text-3xl font-semibold text-white tracking-wider mb-2">栅格布局</h1>
                <p class="text-xs font-medium tracking-widest uppercase" style="color:rgba(255,255,255,0.4)">Grid Layout</p>
            </div>

            <!-- 参数列表 -->
            <div class="space-y-3 mb-8 text-[13px]">
                <div class="flex items-center pb-2" style="border-bottom:1px solid rgba(255,255,255,0.12)">
                    <span class="w-24" style="color:rgba(255,255,255,0.45)">页面尺寸：</span>
                    <span class="font-medium text-blue-400">1710*950px</span>
                </div>
                <div class="flex items-center pb-2" style="border-bottom:1px solid rgba(255,255,255,0.12)">
                    <span class="w-24" style="color:rgba(255,255,255,0.45)">侧边导航：</span>
                    <span class="font-medium text-blue-400">220px</span>
                </div>
                <div class="flex items-center pb-2" style="border-bottom:1px solid rgba(255,255,255,0.12)">
                    <span class="w-24" style="color:rgba(255,255,255,0.45)">列数：</span>
                    <span class="font-medium text-blue-400">24 列</span>
                </div>
                <div class="flex items-center pb-2" style="border-bottom:1px solid rgba(255,255,255,0.12)">
                    <span class="w-24" style="color:rgba(255,255,255,0.45)">水槽 (Gutter)：</span>
                    <span class="font-medium text-blue-400">16px</span>
                </div>
            </div>

            <!-- 说明文字 -->
            <p class="leading-[1.8] text-[12px]" style="color:rgba(255,255,255,0.55)">
                栅格系统是用于规范化信息布局,<br>辅助设计人员组织信息的工具,且能够进一步保证设计与开发过程的规范高效，并提高布局视效的一致性、韵律性、秩序严谨、比例良好等方面。因为后台数据量较大，建立网格系统，采用24栅格，可有效地使页面布局规范，降低用户的认知成本。
            </p>

            <div class="mt-8 pt-4 flex justify-end" style="border-top:1px solid rgba(255,255,255,0.1)">
                <span class="text-[10px] tracking-widest" style="color:rgba(255,255,255,0.25)">UI / WEB SYSTEM DESIGN</span>
            </div>
        </div>

        <!-- 右侧图片区：直接铺满剩余空间 -->
        <div class="flex-grow flex items-center justify-center min-w-0">
            <img src="../image/栅格化布局.webp" alt="栅格化布局" class="w-full h-auto object-contain" style="max-height:calc(100vh - 40px)">
        </div>
    </div>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    gridTemplateColumns: {
                        '24': 'repeat(24, minmax(0, 1fr))',
                    },
                    gridColumn: {
                        'span-6': 'span 6 / span 6',
                        'span-18': 'span 18 / span 18',
                    }
                }
            }
        }
    </script>
