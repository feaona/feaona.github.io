<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5获奖弹框展示 (1920x1080)</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'DIN Alternate', 'DIN Condensed', 'PingFang SC', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        *, *::before, *::after { font-weight: 400; }

        .canvas-1920 {
            width: 1920px;
            height: 1080px;
            background-color: #fcfdfa;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            transform-origin: center center;
        }

        .bg-top-swoosh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 380px;
            background: linear-gradient(to left, #ABCC58 0%, #d4e899 55%, #eef6cc 100%);
            opacity: 0.88;
            z-index: 1;
        }

        .mockup-phone {
            border: 12px solid #ffffff;
            border-radius: 48px;
            background-color: #ffffff;
            position: absolute;
            z-index: 20;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.22), inset 0 0 0 2px rgba(0,0,0,0.05);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.35s ease;
        }
        .mockup-phone:hover {
            transform: translateY(-14px) scale(1.03);
            box-shadow: 0 50px 80px -15px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(0,0,0,0.06);
            z-index: 30;
        }
        .popup-hover {
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.35s ease;
        }
        .popup-hover:hover {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 20px 28px rgba(0,0,0,0.22));
        }

        .mockup-phone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 26px;
            background-color: #ffffff;
            border-bottom-left-radius: 13px;
            border-bottom-right-radius: 13px;
            z-index: 30;
        }

        /* 关闭按钮 */
        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.85);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .close-btn svg {
            display: block;
        }

        /* 独立弹框关闭按钮（浅色背景下加圆形衬底） */
        .close-btn-light {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="canvas-1920" id="main-canvas">

        <!-- 顶部绿色背景色块 -->
        <div class="bg-top-swoosh"></div>

        <!-- 水印 -->
        <div class="absolute top-[100px] left-[100px] flex items-baseline pointer-events-none select-none z-10 opacity-70">
            <span class="text-[100px] font-black text-[#ABCC58] tracking-tighter leading-none">06<span style="color:#F8D560">.</span></span>
            <span class="text-[80px] font-black text-[#dce2c6] tracking-widest ml-4 uppercase leading-none mix-blend-multiply">Design</span>
        </div>

        <!-- 主标题 -->
        <div class="absolute top-[240px] left-[120px] z-20">
            <h1 class="text-[48px] font-bold text-gray-900">
                H5页面展示
            </h1>
        </div>

        <!-- ========== 左侧：独立弹框展示 ========== -->
        <!-- 横向居中对齐水印"Design"的N字（≈left:430px），纵向与右侧样机垂直中心对齐（≈top:414px） -->
        <div class="absolute z-20 flex flex-col items-center" style="left:430px; top:414px;">
            <!-- 弹框图片（无背景容器，直接浮于画布） -->
            <img src="../image/H5ZJ1.webp"
                 style="width:360px;height:auto;max-height:500px;object-fit:contain;display:block;drop-shadow:0 20px 40px rgba(0,0,0,0.32);"
                 class="popup-hover"
                 alt="获奖弹框">
            <!-- 关闭按钮 -->
            <div class="close-btn-light" style="margin-top:18px;">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <line x1="4" y1="4" x2="14" y2="14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                    <line x1="14" y1="4" x2="4" y2="14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <!-- ========== 中间：获奖【弹框】样机 ========== -->
        <div class="mockup-phone w-[300px] h-[650px]" style="right:640px; bottom:100px;">
            <div class="w-full h-full relative overflow-hidden">
                <!-- H5 背景页面 -->
                <img src="../image/H5CT1.webp"
                     style="position:absolute;top:0;left:0;width:100%;height:auto;display:block;">
                <!-- 80% 黑色遮罩 -->
                <div style="position:absolute;inset:0;background:rgba(0,0,0,0.80);z-index:10;"></div>
                <!-- 弹框内容居中 -->
                <div style="position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
                    <img src="../image/H5ZJ1.webp"
                         style="width:220px;height:auto;display:block;border-radius:12px;">
                    <!-- 关闭按钮 -->
                    <div class="close-btn" style="margin-top:18px;">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <line x1="3" y1="3" x2="12" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            <line x1="12" y1="3" x2="3" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <!-- 标签 -->
        <div class="absolute text-center z-20" style="right:640px;width:300px;bottom:48px;">
            <span class="text-[22px] font-bold text-gray-700 tracking-widest">获奖【弹框】</span>
        </div>

        <!-- ========== 右侧：未获奖【弹框】样机 ========== -->
        <div class="mockup-phone w-[300px] h-[650px]" style="right:240px; bottom:100px;">
            <div class="w-full h-full relative overflow-hidden">
                <!-- H5 背景页面 -->
                <img src="../image/H5CT1.webp"
                     style="position:absolute;top:0;left:0;width:100%;height:auto;display:block;">
                <!-- 80% 黑色遮罩 -->
                <div style="position:absolute;inset:0;background:rgba(0,0,0,0.80);z-index:10;"></div>
                <!-- 弹框内容居中 -->
                <div style="position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
                    <img src="../image/H5WZ1.webp"
                         style="width:220px;height:auto;display:block;border-radius:12px;">
                    <!-- 关闭按钮 -->
                    <div class="close-btn" style="margin-top:18px;">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <line x1="3" y1="3" x2="12" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            <line x1="12" y1="3" x2="3" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <!-- 标签 -->
        <div class="absolute text-center z-20" style="right:240px;width:300px;bottom:48px;">
            <span class="text-[22px] font-bold text-gray-700 tracking-widest">未获奖【弹框】</span>
        </div>

    </div>

    <script>
        function fitToScreen() {
            const canvas = document.getElementById('main-canvas');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            canvas.style.transform = `scale(${scale})`;
        }
        fitToScreen();
        window.addEventListener('resize', fitToScreen);
    </script>
</body>
</html>
