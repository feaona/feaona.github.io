<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5页面展示 (1920x1080)</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'DIN Alternate', 'DIN Condensed', 'PingFang SC', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        *, *::before, *::after {
            font-weight: 400;
        }

        .canvas-1920 {
            width: 1920px;
            height: 1080px;
            background-color: #fcfdfa;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0,0,0,0.1);
            flex-shrink: 0;
            transform-origin: center center;
        }

        /* 顶部淡雅的背景色块（与06页一致） */
        .bg-top-swoosh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 380px;
            background: linear-gradient(to left, #ABCC58 0%, #d4e899 55%, #eef6cc 100%);
            opacity: 0.88;
            z-index: 1;
        }

        /* 统一的白色样机样式 */
        .mockup-phone {
            border: 12px solid #ffffff;
            border-radius: 48px;
            background-color: #ffffff;
            position: absolute;
            z-index: 20;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.2), inset 0 0 0 2px rgba(0,0,0,0.05);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.35s ease;
        }
        .mockup-phone:hover {
            transform: translateY(-14px) scale(1.03);
            box-shadow: 0 50px 80px -15px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(0,0,0,0.06);
            z-index: 30;
        }
        .popup-hover {
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.35s ease;
        }
        .popup-hover:hover {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 20px 28px rgba(0,0,0,0.22));
        }

        .mockup-phone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background-color: #ffffff;
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
            z-index: 30;
        }

        .scroll-phone {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
        }
        .scroll-phone:active { cursor: grabbing; }
        .scroll-phone::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="canvas-1920" id="main-canvas">

        <!-- 顶部绿色背景色块 -->
        <div class="bg-top-swoosh"></div>

        <!-- 水印文字（与其他页一致） -->
        <div class="absolute top-[100px] left-[100px] flex items-baseline pointer-events-none select-none z-10 opacity-70">
            <span class="text-[100px] font-black text-[#ABCC58] tracking-tighter leading-none">06<span style="color:#F8D560">.</span></span>
            <span class="text-[80px] font-black text-[#dce2c6] tracking-widest ml-4 uppercase leading-none mix-blend-multiply">Design</span>
        </div>

        <!-- 主标题 -->
        <div class="absolute top-[240px] left-[120px] z-20">
            <h1 class="text-[48px] font-bold text-gray-900">
                H5页面展示
            </h1>
        </div>

        <!-- 左侧转盘与弹窗占位 -->
        <div class="absolute w-[300px] left-[120px] bottom-[100px] z-20 rounded-xl overflow-hidden shadow-lg popup-hover">
            <img src="../image/H5TC1.webp" class="w-full h-auto block" alt="活动弹框">
        </div>
        <div class="absolute w-[300px] left-[120px] bottom-[50px] text-center z-20">
            <span class="text-[22px] font-bold text-gray-700 tracking-widest">活动【弹框】</span>
        </div>

        <div class="absolute w-[300px] left-[450px] bottom-[100px] z-20 rounded-xl overflow-hidden shadow-lg popup-hover">
            <img src="../image/H5HBCRHD.webp" class="w-full h-auto block" alt="Banner图">
        </div>
        <div class="absolute w-[300px] left-[450px] bottom-[50px] text-center z-20">
            <span class="text-[22px] font-bold text-gray-700 tracking-widest">Banner图</span>
        </div>

        <!-- 右侧样机平铺 -->
        <div class="mockup-phone w-[300px] h-[650px]" style="right: 800px; bottom: 100px;">
            <div class="w-full h-full overflow-hidden">
                <img src="../image/H5CT02.webp" class="w-full h-full" style="object-fit:cover;display:block;" alt="主页面">
            </div>
        </div>
        <div class="mockup-phone w-[300px] h-[650px]" style="right: 450px; bottom: 100px;">
            <div class="scroll-phone">
                <img src="../image/H5CT1.webp" class="w-full h-auto block" alt="分页面中间">
            </div>
        </div>
        <div class="mockup-phone w-[300px] h-[650px]" style="right: 100px; bottom: 100px;">
            <div class="scroll-phone">
                <img src="../image/H5CRHD.webp" class="w-full h-auto block" alt="分页面右侧">
            </div>
        </div>

    </div>

    <script>
        function fitToScreen() {
            const canvas = document.getElementById('main-canvas');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            canvas.style.transform = `scale(${scale})`;
        }
        fitToScreen();
        window.addEventListener('resize', fitToScreen);
    </script>
</body>
</html>
