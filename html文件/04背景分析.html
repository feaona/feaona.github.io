<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景分析 (1920x1080)</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'DIN Alternate', 'DIN Condensed', 'PingFang SC', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        /* 全局去除加粗 */
        *, *::before, *::after {
            font-weight: 400;
        }

        /* 核心画布区域，严格限制 1920x1080 */
        .canvas-1920 {
            width: 1920px;
            height: 1080px;
            background-color: #fcfdfa;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0,0,0,0.1);
            flex-shrink: 0;
            transform-origin: center center;
        }

        /* 顶部绿色渐变色块 */
        .top-green-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 380px;
            background: linear-gradient(to left, #ABCC58 0%, #d4e899 55%, #eef6cc 100%);
            opacity: 0.88;
            z-index: 1;
            overflow: hidden;
        }

        /* 手机边框样式 - 适配模版的干净扁平风格 */
        .mockup-phone {
            border: 12px solid #ffffff;
            border-radius: 44px;
            background-color: #f3f4f6;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: absolute;
            cursor: pointer;
            transition: box-shadow 0.35s ease;
        }

        .mockup-phone:hover {
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.22);
        }

        .mockup-phone img {
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mockup-phone:hover img {
            transform: scale(1.07);
        }

        /* 手机刘海屏设计 */
        .mockup-phone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 28px;
            background-color: #ffffff;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 10;
        }

        /* 底部三色卡片悬停动效 */
        .color-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .color-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    
    <!-- 1920*1080 固定画布 -->
    <div class="canvas-1920" id="main-canvas">
        
        <!-- 顶部绿色色块（内含手机，overflow:hidden 裁剪） -->
        <div class="top-green-section">
            <!-- 手机样机 1：H5CRHD2 (375×292)，完整显示在绿色区域内 -->
            <div class="mockup-phone w-[360px] h-[280px]" style="right: 500px; top: 100px; z-index: 20; border-radius: 44px 44px 0 0;">
                <div class="w-full h-full relative">
                    <img src="../image/H5CRHD2.webp" alt="活动页面展示1" class="w-full h-full object-cover">
                </div>
            </div>

            <!-- 手机样机 2：H5CT2 (375×543)，顶部和底部被裁剪，仅显示中间 -->
            <div class="mockup-phone w-[380px] h-[550px]" style="right: 60px; top: -40px; z-index: 30;">
                <div class="w-full h-full relative">
                    <img src="../image/H5CT2.webp" alt="活动页面展示2" class="w-full h-full object-cover">
                </div>
            </div>
        </div>

        <!-- 水印文字（画布级，不被绿色区域裁剪） -->
        <div class="absolute top-[100px] left-[100px] flex items-baseline pointer-events-none select-none z-20 opacity-70">
            <span class="text-[100px] font-black text-[#ABCC58] tracking-tighter leading-none">04<span style="color:#F8D560">.</span></span>
            <span class="text-[80px] font-black text-[#dce2c6] tracking-widest ml-4 uppercase leading-none mix-blend-multiply">Design</span>
        </div>

        <!-- 主标题（画布级） -->
        <div class="absolute top-[240px] left-[120px] z-20">
            <h1 class="text-[48px] font-bold text-gray-900">
                背-景-分-析
            </h1>
        </div>


        <!-- ================= 底部白色区域 (三色诉求卡片) ================= -->
        <div class="absolute bottom-[200px] w-full flex justify-center gap-[50px] z-20 px-[100px]">
            
            <!-- 卡片 1：业务诉求 (晒图赢大奖天蓝) -->
            <div class="color-card w-[480px] h-[300px] bg-[#6AB8F5] flex flex-col items-center justify-center text-white p-8 cursor-default">
                <h2 class="text-[42px] font-normal mb-8 tracking-[0.1em]">业务诉求</h2>
                <p class="text-[26px] text-center leading-[1.8] font-light tracking-wide opacity-95">
                    刺激旅游消费<br>
                    拉动平台转化
                </p>
            </div>

            <!-- 卡片 2：运营诉求 (幸运大抽奖黄) -->
            <div class="color-card w-[480px] h-[300px] bg-[#F8D560] flex flex-col items-center justify-center text-white p-8 cursor-default">
                <h2 class="text-[42px] font-normal mb-8 tracking-[0.1em]">运营诉求</h2>
                <p class="text-[26px] text-center leading-[1.8] font-light tracking-wide opacity-95">
                    玩法奖品丰厚<br>
                    提升用户粘性
                </p>
            </div>

            <!-- 卡片 3：设计诉求 (主题绿) -->
            <div class="color-card w-[480px] h-[300px] bg-[#ABCC58] flex flex-col items-center justify-center text-white p-8 cursor-default">
                <h2 class="text-[42px] font-normal mb-8 tracking-[0.1em]">设计诉求</h2>
                <p class="text-[26px] text-center leading-[1.8] font-light tracking-wide opacity-95">
                    沉浸场景营造<br>
                    提高设计品质
                </p>
            </div>

        </div>

    </div>

    <!-- 兼容性完美的 JS 动态缩放控制 -->
    <script>
        function fitToScreen() {
            const canvas = document.getElementById('main-canvas');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            canvas.style.transform = `scale(${scale})`;
        }
        fitToScreen();
        window.addEventListener('resize', fitToScreen);
    </script>
</body>
</html>
