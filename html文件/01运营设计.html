<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营设计活动总结 (1920x1080)</title>
    <script src="../lib/tailwind.cdn.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'DIN Alternate', 'DIN Condensed', 'PingFang SC', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        *, *::before, *::after {
            font-weight: 400;
        }

        /* 核心画布区域，严格限制 1920x1080 */
        .canvas-1920 {
            width: 1920px;
            height: 1080px;
            background-color: #fcfdfa;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0,0,0,0.1);
            flex-shrink: 0; /* 防止 flex 自动压缩它 */
            transform-origin: center center;
        }

        /* 复杂的对角线背景 */
        .bg-shape {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: #bbd382;
            clip-path: polygon(100% 0, 100% 100%, 30% 100%, 65% 0);
            z-index: 1;
        }

        /* 手机边框样式 - 适配大屏放大 */
        .mockup-phone {
            border: 10px solid #e5e7eb; /* 高级银灰边框 */
            border-radius: 44px;
            background-color: #000; /* 底色为黑，配合内阴影模拟屏幕边缘 */
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4), inset 0 0 0 6px #111827; /* 增强立体感和内侧黑边 */
            overflow: hidden;
            position: absolute;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mockup-phone::before {
            display: none;
        }

        /* 悬浮动画更轻微高级，去除了浮夸的跳动 */
        @keyframes float {
            0% { transform: translateY(0px) rotate(var(--rotation)); }
            50% { transform: translateY(-10px) rotate(calc(var(--rotation) + 1deg)); }
            100% { transform: translateY(0px) rotate(var(--rotation)); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        .mockup-phone:hover {
            animation-play-state: paused;
            transform: translateY(-18px) rotate(var(--rotation)) scale(1.06) !important;
            box-shadow: 0 42px 90px -20px rgba(0, 0, 0, 0.55), inset 0 0 0 6px #111827;
            z-index: 80 !important;
        }

        .mockup-phone img {
            transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
        }

        .mockup-phone:hover img {
            transform: scale(1.035);
            opacity: 1;
        }

        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 2s; }
        .delay-3 { animation-delay: 3s; }
    </style>
</head>
<body>
    
    <!-- 1920*1080 固定画布，增加 id 用于 JS 缩放控制 -->
    <div class="canvas-1920" id="main-canvas">
        
        <!-- 绿色不规则背景色块 -->
        <div class="bg-shape"></div>

        <!-- 水印文字：字号减小，更克制高级 -->
        <div class="absolute top-[100px] left-[100px] flex items-baseline pointer-events-none select-none z-10 opacity-70">
            <span class="text-[100px] font-black text-[#ABCC58] tracking-tighter leading-none">01<span style="color:#F8D560">.</span></span>
            <span class="text-[80px] font-black text-[#dce2c6] tracking-widest ml-4 uppercase leading-none mix-blend-multiply">Design</span>
        </div>

        <!-- 主标题 -->
        <div class="absolute top-[240px] left-[120px] z-20">
            <h1 class="text-[48px] font-black text-gray-900">
                运营设计活动总结
            </h1>
        </div>

        <!-- 左侧文本区域 -->
        <div class="absolute top-[380px] left-[120px] w-[800px] z-20">
            <!-- 内容概要 -->
            <div class="mb-14">
                <div class="flex items-center mb-6">
                    <span class="w-6 h-6 rounded-full bg-[#ABCC58] mr-4 shadow-md shadow-green-200"></span>
                    <h2 class="text-[36px] font-bold text-gray-800 tracking-wide">内容概要</h2>
                </div>
                <p class="text-gray-600 text-[28px] leading-[1.8] pl-10 max-w-[700px]">
                    为增加用户粘性，活跃度，热度以及客户<br>使用APP的趣味性，策划的一个活动。
                </p>
            </div>

            <!-- 活动形式 -->
            <div>
                <div class="flex items-center mb-6">
                    <span class="w-6 h-6 rounded-full bg-[#F8D560] mr-4 shadow-md shadow-yellow-200"></span>
                    <h2 class="text-[36px] font-bold text-gray-800 tracking-wide">活动形式</h2>
                </div>
                <p class="text-gray-600 text-[28px] leading-[1.8] pl-10 max-w-[700px]">
                    以抽奖、晒图、领券的不同营销买点与玩法<br>给用户不一样的服务体验。
                </p>
            </div>
        </div>

        <!-- 右侧视觉展示区域：H5 活动页面样机展示 -->
        
        <!-- 1. 主视觉 (C位，稍大，微倾) -->
        <div class="mockup-phone w-[375px] h-[812px] floating delay-1 z-50 shadow-2xl" style="left: 1050px; top: 118px; --rotation: -3deg; transform: rotate(-3deg);">
            <div class="w-full h-full relative bg-gray-900">
                <img src="../image/H501.jpg" alt="运营活动图1" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- 2. 右上侧副视觉 -->
        <div class="mockup-phone w-[375px] h-[812px] floating delay-2 z-30" style="left: 1430px; top: 36px; --rotation: 6deg; transform: rotate(6deg);">
            <div class="w-full h-full relative bg-gray-800">
                <img src="../image/H502.jpg" alt="运营活动图2" class="w-full h-full object-cover opacity-90">
            </div>
        </div>

        <!-- 3. 右下侧副视觉 -->
        <div class="mockup-phone w-[375px] h-[812px] floating delay-3 z-40 shadow-xl" style="left: 1458px; top: 370px; --rotation: 12deg; transform: rotate(12deg);">
            <div class="w-full h-full relative bg-gray-800">
                <img src="../image/H504.jpg" alt="运营活动图3" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- 4. 左下侧副视觉 -->
        <div class="mockup-phone w-[375px] h-[812px] floating z-20" style="left: 820px; top: 344px; --rotation: -8deg; transform: rotate(-8deg);">
            <div class="w-full h-full relative bg-gray-800">
                <img src="../image/H504.jpg" alt="运营活动图4" class="w-full h-full object-cover opacity-95">
            </div>
        </div>

    </div>

    <!-- 加入兼容性完美的 JS 动态缩放控制 -->
    <script>
        function fitToScreen() {
            const canvas = document.getElementById('main-canvas');
            // 计算当前窗口宽高与 1920x1080 的比例
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            
            // 取最小的比例进行等比缩放，确保整个画面都能显示在窗口内
            const scale = Math.min(scaleX, scaleY);
            
            // 应用缩放
            canvas.style.transform = `scale(${scale})`;
        }

        // 初始化执行一次
        fitToScreen();
        // 当窗口大小改变时自动重新计算
        window.addEventListener('resize', fitToScreen);
    </script>
</body>
</html>
