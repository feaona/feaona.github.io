<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨稿、反白稿 - Monochrome Applications</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden; background: #fff;
            font-family: 'DIN Alternate', 'DIN Next', 'DIN Pro', 'PingFang SC', 'PingFang', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .slide {
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
            position: relative;
            background: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 72px 48px 48px 96px;
        }

        /* ── 墨稿/反白稿 卡片 hover ── */
        .mono-card {
            cursor: pointer;
            transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }
        .mono-card:hover { transform: translateY(-18px); }
        .card-img {
            transition: box-shadow 0.38s ease;
        }
        .card-light { transition: box-shadow 0.38s ease, border-color 0.38s ease; }
        .mono-card:hover .card-light {
            box-shadow: 0 28px 64px rgba(0,0,0,0.16), 0 0 0 2.5px #1A9FDA;
            border-color: #1A9FDA !important;
        }
        .mono-card:hover .card-dark {
            box-shadow: 0 28px 64px rgba(0,0,0,0.55), 0 0 0 2.5px #1A9FDA;
        }
    </style>
</head>
<body>
<div class="slide">

    <!-- 背景光影 -->
    <div style="position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;">
        <div style="position:absolute;bottom:80px;left:25%;width:480px;height:160px;background:#ffcc00;opacity:0.02;filter:blur(80px);transform:rotate(-12deg);border-radius:9999px;"></div>
        <div style="position:absolute;top:25%;right:25%;width:320px;height:320px;background:#1A9FDA;opacity:0.03;filter:blur(100px);border-radius:9999px;"></div>
        <svg style="position:absolute;bottom:0;left:0;width:100%;height:45%;opacity:0.15;" preserveAspectRatio="none" viewBox="0 0 1440 400" fill="none" xmlns="http://www.w3.org/2000/svg">

            <path d="M0,400 L0,250 C300,350 450,180 850,220 C1150,250 1350,150 1440,180 L1440,400 Z" fill="url(#wD8)"/>
            <defs>
                <linearGradient id="wL8" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#1A9FDA" stop-opacity="0.8"/>
                    <stop offset="50%" stop-color="#00f2fe" stop-opacity="0.4"/>
                    <stop offset="100%" stop-color="#fff" stop-opacity="0.1"/>
                </linearGradient>
                <linearGradient id="wD8" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#0a4b8c" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#1A9FDA" stop-opacity="0.05"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 四角裁剪标记 -->
    <div style="position:absolute;top:32px;left:32px;width:20px;height:20px;border-top:2px solid #e5e7eb;border-left:2px solid #e5e7eb;z-index:1;"></div>
    <div style="position:absolute;top:32px;right:32px;width:20px;height:20px;border-top:2px solid #e5e7eb;border-right:2px solid #e5e7eb;z-index:1;"></div>
    <div style="position:absolute;bottom:32px;left:32px;width:20px;height:20px;border-bottom:2px solid #e5e7eb;border-left:2px solid #e5e7eb;z-index:1;"></div>
    <div style="position:absolute;bottom:32px;right:32px;width:20px;height:20px;border-bottom:2px solid #e5e7eb;border-right:2px solid #e5e7eb;z-index:1;"></div>

    <!-- Header -->
    <header style="display:grid;grid-template-columns:5fr 7fr;gap:64px;position:relative;z-index:10;width:100%;margin-bottom:80px;flex-shrink:0;">
        <div style="padding-bottom:7px;border-bottom:2.5px solid #1A9FDA;color:#374151;font-size:24px;letter-spacing:0.12em;font-family:'DIN Alternate','DIN Next','DIN Pro',sans-serif;">
            ZHIJUXING Visual Image Guidance
        </div>
        <div style="padding-bottom:7px;border-bottom:2.5px solid #1A9FDA;color:#374151;font-size:24px;letter-spacing:0.12em;font-family:'DIN Alternate','DIN Next','DIN Pro',sans-serif;">
            Monochrome Applications
        </div>
    </header>

    <!-- 主体内容：左文字 | 右图形 -->
    <div style="flex:1;min-height:0;position:relative;z-index:10;display:grid;grid-template-columns:5fr 7fr;gap:64px;align-items:stretch;">

        <!-- 左侧：文字说明 -->
        <div style="display:flex;flex-direction:column;height:100%;min-height:0;">
            <h1 style="font-size:72px;font-weight:700;color:#111827;letter-spacing:0.06em;line-height:1.2;margin-bottom:48px;flex-shrink:0;font-family:'PingFang SC','PingFang',-apple-system,BlinkMacSystemFont,sans-serif;">标志特殊应用墨稿、<br>反白稿</h1>
            <div style="flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-between;">
                <div style="display:flex;flex-direction:column;gap:28px;font-size:26px;line-height:1.75;color:#4b5563;text-align:justify;letter-spacing:0.04em;font-family:'PingFang SC','PingFang',-apple-system,BlinkMacSystemFont,sans-serif;">
                    <p>墨稿（全黑）与反白稿（全白）是「智聚行」品牌标志在特殊工艺和媒介上的规范应用形式。</p>
                    <p>它们主要适用与无法使用标准色（#1A9FDA 智聚蓝）或全彩的制作工艺。</p>
                    <p><span style="font-weight:700;color:#374151;">如：</span>单色印刷、文件复印、横切、丝网印制、UV、冲压、刺绣或雕刻等。</p>
                </div>
                <!-- 底部装饰：竖线 + 圆点阵 -->
                <div style="position:relative;height:48px;flex-shrink:0;margin-top:32px;">
                    <div style="position:absolute;top:0;left:0;width:1.5px;height:100%;background:#1f2937;"></div>
                    <div style="position:absolute;top:8px;left:-20px;display:flex;gap:4px;">
                        <div style="display:flex;flex-direction:column;gap:4px;">
                            <div style="width:4px;height:4px;border-radius:50%;background:#9ca3af;"></div>
                            <div style="width:4px;height:4px;border-radius:50%;background:#9ca3af;"></div>
                            <div style="width:4px;height:4px;border-radius:50%;background:#9ca3af;"></div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:4px;">
                            <div style="width:4px;height:4px;border-radius:50%;background:#9ca3af;"></div>
                            <div style="width:4px;height:4px;border-radius:50%;background:#9ca3af;"></div>
                            <div style="width:4px;height:4px;border-radius:50%;background:#9ca3af;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：图形矩阵展示 -->
        <div style="width:100%;height:100%;display:flex;flex-direction:column;">
            <h1 style="font-size:64px;font-weight:700;line-height:1.2;margin-bottom:48px;flex-shrink:0;visibility:hidden;">占位<br>占位</h1>
