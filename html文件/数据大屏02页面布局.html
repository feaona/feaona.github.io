<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02页面布局 - 结构件项目</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', STHeiti, 'Microsoft Yahei', sans-serif;
        }

        /* 核心画布容器 1920x1080 */
        #scale-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            transform-origin: center center;
            background: url('../image/数据大屏背景.webp') center center / cover no-repeat;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: translate(-50%, -50%);
        }

        /* 蓝图网格背景 */
        .blueprint-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* 顶部标题区 */
        .header {
            position: absolute;
            top: 60px;
            left: 60px;
            z-index: 10;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            width: 760px;
        }

        .header-num {
            font-size: 86px;
            font-weight: 800;
            color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
            line-height: 1;
            letter-spacing: 2px;
        }

        .header-title {
            font-size: 54px;
            font-weight: 600;
            color: #ffffff;
            margin-left: 15px;
            letter-spacing: 4px;
            line-height: 1;
        }

        .header-underline {
            width: 480px;
            height: 6px;
            background: linear-gradient(90deg, #00e5ff, rgba(0, 229, 255, 0));
            margin-top: 15px;
            position: relative;
            box-shadow: 0 0 10px #00e5ff;
        }

        .header-underline::before {
            content: '';
            position: absolute;
            left: 0;
            top: -2px;
            width: 30px;
            height: 8px;
            background-color: #fff;
            box-shadow: 0 0 10px #00e5ff;
        }

        /* 副标题说明文字 */
        .subtitle {
            position: absolute;
            top: 220px;
            left: 60px;
            z-index: 10;
            font-size: 40px;
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 2px;
            line-height: 1.5;
        }

        /* 图片展示区（约束在左侧） */
        .layout-image {
            position: absolute;
            top: 310px;
            left: 60px;
            right: 820px;
            bottom: 60px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .layout-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94),
                        box-shadow 0.4s ease,
                        filter 0.4s ease;
        }
        .layout-image img:hover {
            transform: scale(1.03) translateY(-8px);
            box-shadow: 0 0 70px rgba(0,229,255,0.5), 0 20px 56px rgba(0,0,0,0.55);
            filter: brightness(1.06);
        }

        /* 右侧旋转齿轮 */
        .tech-graphic {
            position: absolute;
            right: -160px;
            top: -130px;
            width: 1300px;
            height: 1404px;
            z-index: 3;
            pointer-events: none;
            transform: translateZ(0);
        }

        .spin-slow   { transform-origin: 800px 540px; }
        .spin-reverse { transform-origin: 800px 540px; }
    </style>
</head>
<body>

    <div id="scale-wrapper">
        <!-- 蓝图底纹 -->
        <div class="blueprint-grid"></div>

        <!-- 标题区域 -->
        <header class="header">
            <div style="display: flex; align-items: baseline;">
                <span class="header-num">0<span style="color:#F5A623;text-shadow:0 0 20px rgba(245,166,35,0.6);">2</span></span>
                <span class="header-title">页面布局</span>
            </div>
            <div class="header-underline"></div>
        </header>

        <!-- 副标题文字 -->
        <p class="subtitle">根据使用场景，业务权重，将各个业务合理分配布局</p>

        <!-- 页面布局图片（左侧） -->
        <div class="layout-image">
            <img src="../image/页面布局.webp" alt="页面布局">
        </div>

        <!-- 右侧旋转齿轮 SVG -->
        <svg class="tech-graphic" viewBox="0 0 1000 1080">
            <defs>
                <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <g id="icon-bearing" stroke="#00e5ff" stroke-width="2" fill="none">
                    <circle cx="0" cy="0" r="18" /><circle cx="0" cy="0" r="10" />
                    <circle cx="0" cy="-14" r="2.5" fill="#00e5ff"/><circle cx="0" cy="14" r="2.5" fill="#00e5ff"/>
                    <circle cx="-14" cy="0" r="2.5" fill="#00e5ff"/><circle cx="14" cy="0" r="2.5" fill="#00e5ff"/>
                    <circle cx="-10" cy="-10" r="2.5" fill="#00e5ff"/><circle cx="10" cy="10" r="2.5" fill="#00e5ff"/>
                    <circle cx="-10" cy="10" r="2.5" fill="#00e5ff"/><circle cx="10" cy="-10" r="2.5" fill="#00e5ff"/>
                </g>
                <g id="icon-shaft" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linejoin="round">
                    <rect x="-16" y="-8" width="32" height="16" fill="rgba(0,229,255,0.1)"/>
                    <line x1="-16" y1="0" x2="-24" y2="0" stroke-width="4"/><line x1="16" y1="0" x2="24" y2="0" stroke-width="4"/>
                    <path d="M -8 -8 L -8 8 M 0 -8 L 0 8 M 8 -8 L 8 8" stroke-width="1" stroke-dasharray="2 2"/>
                </g>
                <g id="icon-motor" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linejoin="round">
                    <rect x="-14" y="-12" width="10" height="24" rx="2" fill="rgba(0,229,255,0.1)"/>
                    <rect x="-4" y="-10" width="18" height="20" rx="1" />
                    <line x1="-14" y1="0" x2="-22" y2="0" stroke-width="3"/>
                    <line x1="-4" y1="-5" x2="14" y2="-5" stroke-width="1"/><line x1="-4" y1="5" x2="14" y2="5" stroke-width="1"/>
                </g>
                <g id="icon-gear-single" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linejoin="round">
                    <circle cx="0" cy="0" r="12" fill="rgba(0,229,255,0.1)"/>
                    <path d="M 0 -12 L 0 -18 M 0 12 L 0 18 M -12 0 L -18 0 M 12 0 L 18 0" stroke-width="4"/>
                    <path d="M -8.5 -8.5 L -13 -13 M 8.5 8.5 L 13 13 M -8.5 8.5 L -13 13 M 8.5 -8.5 L 13 -13" stroke-width="4"/>
                    <circle cx="0" cy="0" r="4" fill="#00e5ff"/>
                </g>
                <g id="icon-fastener" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linejoin="round">
                    <polygon points="0,-18 12,-11 12,3 0,10 -12,3 -12,-11" fill="rgba(0,229,255,0.1)"/>
                    <polygon points="0,-12 6,-8 6,0 0,4 -6,0 -6,-8" />
                    <path d="M -6 10 L -6 20 M 6 10 L 6 20" /><path d="M -6 14 L 6 14 M -6 18 L 6 18" />
                </g>
                <g id="planet-gear-def">
                    <circle cx="0" cy="0" r="45" fill="#00152b" stroke="#00e5ff" stroke-width="2"/>
                    <circle cx="0" cy="0" r="38" fill="none" stroke="#00e5ff" stroke-width="10" stroke-dasharray="8 9.9"/>
                    <circle cx="0" cy="0" r="10" fill="#00e5ff"/>
                    <path d="M -45 0 L 45 0 M 0 -45 L 0 45" stroke="rgba(0,229,255,0.4)" stroke-width="2"/>
                    <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(0,229,255,0.6)" stroke-width="1"/>
                </g>
                <g id="hex-container">
                    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="rgba(0,229,255,0.05)" stroke="#00e5ff" stroke-width="2" filter="url(#cyanGlow)"/>
                    <polygon points="0,-35 30,-17.5 30,17.5 0,35 -30,17.5 -30,-17.5" fill="none" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
                </g>
            </defs>

            <circle cx="800" cy="540" r="450" fill="none" stroke="rgba(0,102,255,0.2)" stroke-width="1" />
            <circle cx="800" cy="540" r="550" fill="none" stroke="rgba(0,229,255,0.1)" stroke-width="2" />
            <g class="spin-slow">
                <circle cx="800" cy="540" r="380" fill="none" stroke="#00e5ff" stroke-width="1" stroke-dasharray="10 30" />
            </g>
            <g class="spin-reverse">
                <circle cx="800" cy="540" r="200" fill="rgba(0,20,40,0.6)" stroke="#0066ff" stroke-width="4"/>
                <circle cx="800" cy="540" r="185" fill="none" stroke="#00e5ff" stroke-width="16" stroke-dasharray="14 15.1"/>
                <circle cx="800" cy="540" r="225" fill="none" stroke="#00e5ff" stroke-width="2" stroke-dasharray="30 10"/>
                <g fill="#00e5ff">
                    <circle cx="800" cy="315" r="4"/><circle cx="800" cy="765" r="4"/>
                    <circle cx="575" cy="540" r="4"/><circle cx="1025" cy="540" r="4"/>
                    <circle cx="641" cy="381" r="4"/><circle cx="959" cy="699" r="4"/>
                    <circle cx="959" cy="381" r="4"/><circle cx="641" cy="699" r="4"/>
                </g>
            </g>
            <g class="spin-slow" style="transform-origin: 800px 540px;">
                <polygon points="800,380 938.6,620 661.4,620" fill="rgba(0,102,255,0.15)" stroke="#00e5ff" stroke-width="3"/>
                <circle cx="800" cy="540" r="70" fill="rgba(0,20,40,0.8)" stroke="#0066ff" stroke-width="2"/>
                <g transform="translate(800,410)"><g class="spin-gear-fast-reverse" style="transform-origin:0px 0px;"><use href="#planet-gear-def"/></g></g>
                <g transform="translate(912.6,605)"><g class="spin-gear-fast-reverse" style="transform-origin:0px 0px;"><use href="#planet-gear-def"/></g></g>
                <g transform="translate(687.4,605)"><g class="spin-gear-fast-reverse" style="transform-origin:0px 0px;"><use href="#planet-gear-def"/></g></g>
                <polygon points="800,410 912.6,605 687.4,605" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linejoin="round" opacity="0.5"/>
            </g>
            <g class="spin-gear-fast" style="transform-origin: 800px 540px;">
                <circle cx="800" cy="540" r="85" fill="rgba(0,40,80,0.9)" stroke="#00e5ff" stroke-width="2"/>
                <circle cx="800" cy="540" r="76" fill="none" stroke="#00e5ff" stroke-width="12" stroke-dasharray="12 13.5"/>
                <circle cx="800" cy="540" r="30" fill="none" stroke="#ffffff" stroke-width="3"/>
                <circle cx="800" cy="540" r="14" fill="#00e5ff" class="pulse-opacity"/>
                <path d="M 770 540 L 830 540 M 800 510 L 800 570" stroke="#000" stroke-width="4"/>
                <path d="M 715 540 L 885 540 M 800 455 L 800 625 M 740 480 L 860 600 M 740 600 L 860 480" stroke="rgba(0,229,255,0.3)" stroke-width="2"/>
            </g>
            <g transform="translate(625,237)"><use href="#hex-container"/><use href="#icon-bearing"/></g>
            <g transform="translate(975,237)"><use href="#hex-container"/><use href="#icon-shaft"/></g>
            <g transform="translate(450,540)"><use href="#hex-container"/><use href="#icon-fastener"/></g>
            <g transform="translate(625,843)"><use href="#hex-container"/><use href="#icon-gear-single"/></g>
            <g transform="translate(975,843)"><use href="#hex-container"/><use href="#icon-motor"/></g>
            <path d="M 500 540 L 575 540 M 660 300 L 710 380 M 660 780 L 710 700 M 940 300 L 890 380 M 940 780 L 890 700" stroke="rgba(0,229,255,0.6)" stroke-width="3" stroke-dasharray="6 4"/>
            <circle cx="500" cy="540" r="4" fill="#00e5ff"/>
            <circle cx="660" cy="300" r="4" fill="#00e5ff"/><circle cx="660" cy="780" r="4" fill="#00e5ff"/>
            <circle cx="940" cy="300" r="4" fill="#00e5ff"/><circle cx="940" cy="780" r="4" fill="#00e5ff"/>
        </svg>
    </div>

    <!-- 响应式缩放脚本 -->
    <script>
        function resizeSlide() {
            const wrapper = document.getElementById('scale-wrapper');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', resizeSlide);
        resizeSlide();
    </script>
</body>
</html>
