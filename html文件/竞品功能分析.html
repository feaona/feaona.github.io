        * {

        }

        body, html {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #dceaff 0%, #edf4ff 50%, #dceaff 100%);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        ::-webkit-scrollbar { display: none; }

        #scale-wrapper {
            width: 100%;
            background: linear-gradient(135deg, #dceaff 0%, #edf4ff 50%, #dceaff 100%);
        }

        .presentation-slide {
            width: 1920px;
            margin: 0 auto;
            padding: 100px 160px 150px 160px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #dceaff 0%, #edf4ff 50%, #dceaff 100%);
            transform-origin: top left;
        }

        /* ── 头部 ── */
        .header {
            display: block;
            margin-bottom: 70px;
        }

        .blue-slash {
            width: 16px;
            height: 54px;
            background-color: #2563eb;
            transform: skewX(-15deg);
            margin-right: 24px;
            margin-top: 6px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .title-group h1 {
            margin: 0;
            font-size: 75px;
            color: #111111;
            font-weight: 300;
            letter-spacing: -1.2px;
            line-height: 1.15;
        }

        .title-group h2 {
            margin: 0 0 18px 0;
            font-size: 20px;
            color: rgba(26,100,180,0.7);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3.5px;
        }

        /* ── 表格容器 ── */
        .table-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ── 行布局：第1列产品区固定 180px，其余 8 列平分 ── */
        .table-row {
            display: grid;
            grid-template-columns: 180px repeat(8, 1fr);
            align-items: center;
            padding: 36px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .table-row:last-child { border-bottom: none; }

        /* ── 表头 ── */
        .table-header {
            border-bottom: 2px solid #2563eb;
            padding-top: 0;
            padding-bottom: 28px;
        }

        .th {
            color: #2563eb;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
        }

        .th:first-child { text-align: center; }

        /* ── 产品名称列 ── */
        .col-product {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-logo {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            object-fit: cover;
            margin-bottom: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            background-color: #e2e8f0;
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .app-logo:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .product-name {
            font-size: 22px;
            color: #1e293b;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }

        /* ── 功能列 ── */
        .col-cell {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── SVG 对勾 / 横线 ── */
        .svg-check, .svg-dash {
            width: 42px;
            height: 42px;
        }

        .svg-check path {
            fill: none;
            stroke: #2563eb;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .svg-dash path {
            fill: none;
            stroke: #cbd5e1;
            stroke-width: 4;
            stroke-linecap: round;
        }
    </style>

    <script>
        function fitToScreen() {
            const wrapper = document.getElementById('scale-wrapper');
            const slide   = document.getElementById('slide');
            const windowWidth = window.innerWidth;
            const scale = windowWidth < 1920 ? windowWidth / 1920 : 1;
            slide.style.transform = scale < 1 ? 'scale(' + scale + ')' : 'scale(1)';
            slide.style.margin    = scale < 1 ? '0' : '0 auto';
            const actualHeight = slide.offsetHeight * scale;
            wrapper.style.height = actualHeight + 'px';
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'iframeHeight', height: actualHeight }, '*');
            }
        }
        window.addEventListener('resize', fitToScreen);
        window.addEventListener('load', fitToScreen);
        fitToScreen();
    </script>
