<title>Logo 设计 · 智聚行品牌标识系统 — 丁爱凤</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'DIN Pro','DIN Alternate','PingFang SC',-apple-system,BlinkMacSystemFont,'Helvetica Neue',system-ui,sans-serif;
  --blur:blur(28px) saturate(200%);
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:#04040A;
  background-image:linear-gradient(rgba(26,159,218,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,159,218,0.04) 1px,transparent 1px);
  background-size:48px 48px;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── 返回按钮（与 C端设计 modal .proj-close 完全一致）── */
.proj-close{position:fixed;top:20px;right:24px;z-index:1001;display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(255,255,255,0.07);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid rgba(255,255,255,0.14);border-radius:999px;color:rgba(255,255,255,0.72);font-size:12.5px;font-family:var(--font);cursor:pointer;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08);transition:background .2s,color .2s,transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.proj-close:hover{background:rgba(255,255,255,0.13);color:#fff;transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.12)}

/* ── PAGE WRAP：与 .proj-modal padding 保持一致 ── */
.page-wrap{padding:64px 20px 80px}
@media(min-width:768px){.page-wrap{padding-left:32px;padding-right:32px}}
@media(min-width:1024px){.page-wrap{padding-left:48px;padding-right:48px}}

/* ── INNER：与 .proj-modal-inner 保持一致 ── */
.page-inner{width:100%;max-width:1440px;margin:0 auto;padding:36px 0 80px;position:relative;z-index:1}

/* ── C端设计 modal 里的 section 样式（原版复制）── */
.proj-section-m{margin-bottom:80px}
.proj-sec-label-m{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(96,165,250,0.75);margin-bottom:10px}
.proj-sec-title-m{font-size:clamp(24px,3vw,40px);font-weight:300;letter-spacing:-1.2px;color:rgba(255,255,255,0.88);margin-bottom:40px;line-height:1.15}
.proj-sec-title-m strong{font-weight:600;color:#fff}

/* ── Logo 专属动效（原版完整复制）── */
@keyframes logoBadgeIn{
  0%{opacity:0;transform:translateY(14px)}
  100%{opacity:1;transform:translateY(0)}
}
.logo-badge-visible{animation:logoBadgeIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards}
.logo-showcase-card{transform-style:preserve-3d}
.logo-mark-interactive{
  position:relative;margin:-14px -16px;padding:14px 16px;
  border-radius:18px;isolation:isolate;overflow:hidden;cursor:pointer;pointer-events:auto;
  transform:perspective(900px) rotateX(var(--logo-tilt-x,0deg)) rotateY(var(--logo-tilt-y,0deg)) translateY(0) scale(1);
  filter:drop-shadow(0 18px 30px rgba(0,0,0,0.18));
  transition:transform .38s cubic-bezier(.22,1,.36,1),filter .38s ease;
}
.logo-mark-interactive::before{
  content:'';position:absolute;inset:4px 0;z-index:-1;border-radius:inherit;
  background:radial-gradient(circle at 22% 30%,rgba(26,159,218,0.36),transparent 36%),linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.02));
  opacity:0;transform:scale(.94);transition:opacity .38s ease,transform .38s cubic-bezier(.22,1,.36,1);
}
.logo-mark-interactive::after{
  content:'';position:absolute;top:8px;bottom:8px;left:-45%;width:34%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,0.58),transparent);
  filter:blur(1px);opacity:0;transform:skewX(-18deg);
}
.logo-mark-interactive svg{position:relative;z-index:1;transform-origin:center;transition:transform .38s cubic-bezier(.22,1,.36,1),filter .38s ease}
.logo-mark-interactive svg path{transition:fill .38s ease,opacity .38s ease}
.logo-mark-interactive:hover{transform:perspective(900px) rotateX(var(--logo-tilt-x,0deg)) rotateY(var(--logo-tilt-y,0deg)) translateY(-6px) scale(1.018);filter:drop-shadow(0 28px 42px rgba(0,0,0,0.32)) drop-shadow(0 0 18px rgba(26,159,218,0.22))}
.logo-mark-interactive:hover::before{opacity:1;transform:scale(1)}
.logo-mark-interactive:hover::after{animation:logoShineSweep 1.05s cubic-bezier(.22,1,.36,1) both}
.logo-mark-interactive:hover svg{filter:drop-shadow(0 0 10px rgba(255,255,255,0.28))}
@keyframes logoShineSweep{0%{left:-45%;opacity:0}18%{opacity:.8}100%{left:112%;opacity:0}}


        /* ── 全局滚动条 ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0);
            border-radius: 3px;
            transition: background 0.55s ease;
        }
        .is-scrolling::-webkit-scrollbar-thumb { background: rgba(18,18,18,0.22); }
        ::-webkit-scrollbar-thumb:hover      { background: rgba(18,18,18,0.36) !important; transition: background 0.15s ease; }
        ::-webkit-scrollbar-corner           { background: transparent; }
        /* Firefox */
        * { scrollbar-width: thin; scrollbar-color: transparent transparent; }
        .is-scrolling { scrollbar-color: rgba(18,18,18,0.22) transparent; }
</style>

<script>
/* Logo SVG badge：滚动进入视口时淡入上浮 */
(function () {
  var badge = document.getElementById('logo-svg-badge');
  if (!badge) return;
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        badge.classList.add('logo-badge-visible');
        obs.disconnect();
      }
    });
  }, { threshold: 0.25 });
  obs.observe(badge);
})();
</script>
<script>
/* Logo SVG badge：鼠标悬停视差倾斜 */
(function () {
  var mark = document.querySelector('.logo-mark-interactive');
  if (!mark) return;
  mark.addEventListener('mousemove', function (event) {
    var rect = mark.getBoundingClientRect();
    var x = (event.clientX - rect.left) / rect.width;
    var y = (event.clientY - rect.top) / rect.height;
    mark.style.setProperty('--logo-tilt-y', ((x - 0.5) * 7).toFixed(2) + 'deg');
    mark.style.setProperty('--logo-tilt-x', ((0.5 - y) * 5).toFixed(2) + 'deg');
  });
  mark.addEventListener('mouseleave', function () {
    mark.style.setProperty('--logo-tilt-x', '0deg');
    mark.style.setProperty('--logo-tilt-y', '0deg');
  });
})();
</script>


    <script>
    /* 滚动时为滚动元素添加 is-scrolling 类，停止后移除 */
    (function(){
        var timers = typeof WeakMap !== 'undefined' ? new WeakMap() : null;
        function onScroll(e){
            var el = (e.target === document) ? document.body : e.target;
            if(!el || !el.classList) return;
            el.classList.add('is-scrolling');
            if(timers){
                if(timers.has(el)) clearTimeout(timers.get(el));
                timers.set(el, setTimeout(function(){ el.classList.remove('is-scrolling'); }, 900));
            }
        }
        window.addEventListener('scroll', onScroll, { passive: true, capture: true });
    })();
    </script>
